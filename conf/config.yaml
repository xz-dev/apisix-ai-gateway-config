# Local APISIX AI gateway on 127.0.0.1:4000.
# Provider API keys are not stored here; scripts/configure-routes.sh reads
# them from the ignored project-local .env and writes route config via Admin API.
apisix:
  node_listen:
    - 9080
  enable_ipv6: false
  ssl:
    enable: false

nginx_config:
  error_log: /dev/stderr
  error_log_level: warn
  http:
    access_log: /dev/stdout

plugins:
  - ai
  - mocking
  - ai-proxy-multi
  - ai-proxy
  - prometheus

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    admin_key_required: true
    admin_key:
      - name: admin
        key: local-apisix-admin-key-change-me
        role: admin
    allow_admin:
      - 0.0.0.0/0
    admin_listen:
      ip: 0.0.0.0
      port: 9180
  etcd:
    host:
      - http://apisix-etcd:2379
    prefix: /apisix
    timeout: 30
    startup_retry: 5
